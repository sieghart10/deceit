<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Image</title>
  <link rel="stylesheet" href="/extension/styles/upload.css">
  <script defer src="/extension/scripts/upload.js"></script>
</head>
<body>
    <div id="drop-zone">
        <a class="drop-text">Drop image here or click to upload</a>
        <input type="file" id="file-input" accept="image/*" hidden />
        <img id="preview" />
    </div>
</body>
</html>
